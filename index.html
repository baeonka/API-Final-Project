<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Cinemapath</title>
</head>
<body>
    <section id="landing">
        <nav>
            <div class="nav__container">
                        <img class="logo" src="./assets/movie reel.svg" alt="Cinemapath Logo">
                        <h3 class="brand">CINEMAPATH</h3>
                    <ul class="nav__links">
                        <li><a href="#" class="nav__link">Home</a></li>
                        <li><a href="#" class="nav__link">Search Movies</a></li>
                        <li><a href="#" class="nav__link nav__link--primary">Contact</a></li>
                    </ul>
            </div>
        </nav>

        <div class="landing__container">
            <div class="row landing__row">
                <h1 class="title">The World's Stories, At Your Fingertips</h1>
                <h3 class="sub__title">What are you watching tonight?</h3>
                <input type="text" class="search__input" placeholder="Name a film. Any film.">
                <button class="search__btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </section>
    
    <footer>
        <div class="container">
            <div class="row footer__row">

                <figure>
                    <img class="footer__logo--img" src="./assets/popcorn-removebg-preview.png" alt="footer__logo">
                </figure>

                <div class="footer__links">
                    <a href="#" class="
                    footer__link
                    link__hover-effect
                    ">Home</a>

                    <a href="#" target="_blank" class="
                    footer__link
                    link__hover-effect
                    ">Search Movies</a>

                    <a href="#" target="_blank" class="
                    footer__link
                    link__hover-effect
                    ">Contact</a>
                </div>
                <div class="footer__copyright">Copyright &copy; 2026 Bianca Montalvo</div>
            </div>
        </div>
    </footer>

</body>
</html>
