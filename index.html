<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Cinemapath</title>
</head>
<body>
    <section id="landing">
        <nav>
            <div class="nav__container">
                <div class="nav__row">
                        <img class="logo" src="./assets/CINEPATH.svg" alt="Cinemapath Logo">CINEMAPATH
                    <ul class="nav__links">
                        <li><a href="#" class="nav__link">Home</a></li>
                        <li><a href="#" class="nav__link">Search Movies</a></li>
                        <li><a href="#" class="nav__link nav__link--primary">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="landing__container">
            <div class="row">
                <h1 class="title">The World's Stories, At Your Fingertips</h1>
                <h3 class="sub__title">What are you watching tonight?</h3>
                <input type="text" class="search__input" placeholder="Name a film. Any film.">
                <button class="search__btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </section>

</body>
</html>
